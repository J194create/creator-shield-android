apply plugin: 'com.android.application'

android {
    compileSdkVersion 35
    namespace 'com.creatorshields.app'

    defaultConfig {
        applicationId "com.creatorshields.app"
        minSdkVersion 21
        targetSdkVersion 35
        versionCode 3
        versionName "1.0.2"
    }

    signingConfigs {
        release {
            storeFile file(project.findProperty('KEYSTORE_PATH') ?: 'android.keystore')
            storePassword project.findProperty('KEYSTORE_PASS') ?: 'CreatorShield2026!'
            keyAlias project.findProperty('KEY_ALIAS') ?: 'creatorshield'
            keyPassword project.findProperty('KEY_PASS') ?: 'CreatorShield2026!'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.browser:browser:1.8.0'
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
