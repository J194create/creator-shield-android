name: Build Android TWA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Copy permanent signing keystore
        run: |
          cp keystore/creatorshield.keystore android-twa/app/android.keystore
          echo ""
          echo "========================================"
          echo " SHA-256 Fingerprint (permanent keystore)"
          echo "========================================"
          keytool -list -v \
            -keystore android-twa/app/android.keystore \
            -alias creatorshield \
            -storepass "CreatorShield2026!" 2>&1 | grep "SHA256:" | tee sha256-fingerprint.txt
          echo "========================================"

      - name: Build release AAB
        working-directory: android-twa
        run: |
          gradle bundleRelease \
            -PKEYSTORE_PATH=android.keystore \
            -PKEYSTORE_PASS="CreatorShield2026!" \
            -PKEY_ALIAS=creatorshield \
            -PKEY_PASS="CreatorShield2026!" \
            --stacktrace

      - name: Upload AAB + SHA-256 fingerprint
        uses: actions/upload-artifact@v4
        with:
          name: creator-shield-android-v${{ github.run_number }}
          path: |
            android-twa/app/build/outputs/bundle/release/*.aab
            sha256-fingerprint.txt
          retention-days: 30
