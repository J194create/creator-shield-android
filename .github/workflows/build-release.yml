name: Build & Sign Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build release APK
        working-directory: android-twa
        run: |
          gradle assembleRelease --no-daemon \
            -PKEYSTORE_PATH=../keystore/android.keystore \
            -PKEYSTORE_PASS=${{ secrets.KEYSTORE_PASS }} \
            -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PKEY_PASS=${{ secrets.KEY_PASS }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: creator-shield-v1.0.6-release
          path: android-twa/app/build/outputs/apk/release/*.apk
          retention-days: 14

      - name: Build release AAB (for Play Store)
        working-directory: android-twa
        run: |
          gradle bundleRelease --no-daemon \
            -PKEYSTORE_PATH=../keystore/android.keystore \
            -PKEYSTORE_PASS=${{ secrets.KEYSTORE_PASS }} \
            -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PKEY_PASS=${{ secrets.KEY_PASS }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: creator-shield-v1.0.6-release-bundle
          path: android-twa/app/build/outputs/bundle/release/*.aab
          retention-days: 14
